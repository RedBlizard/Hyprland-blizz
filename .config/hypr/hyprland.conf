# █▀▄▀█ Hyprland.conf - Clean & Optimized
# This configuration is structured for readability and maintainability
# By RedBlizard April 11 2026                         

###########################################
# Source a file (multi-file configs)
###########################################
    source = ~/.config/hypr/conf/debug.conf
    source = ~/.config/hypr/conf/exec_once.conf
    source = ~/.config/hypr/conf/env_var.conf
    source = ~/.config/hypr/conf/monitor.conf
    source = ~/.config/hypr/conf/workspaces.conf
    source = ~/.config/hypr/conf/key_binds.conf
    source = ~/.config/hypr/conf/window_binds.conf
    source = ~/.config/hypr/conf/window_rules.conf

############
# XWAYLAND
############

xwayland {
    force_zero_scaling = false # change if needed       
    use_nearest_neighbor = true
    enabled = true
}
render {
  direct_scanout = 0
}

#########
# INPUT
#########

input {
   kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =    
    numlock_by_default = true

#################
# MOUSE / TOUCH
#################

  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  #accel_profile =     # flat or adaptive or blank or EMPTY means libinput’s default mode
  numlock_by_default = true
  left_handed = false
  float_switch_override_focus = false

touchpad {
    natural_scroll = true
    tap-to-click = true
    drag_lock = true
    disable_while_typing = true
}

  # below for devices with touchdevice ie. touchscreen
	touchdevice {
		enabled = true
	} 

	# below is for table see link above for proper variables
	tablet {
		transform = 0
		left_handed = 0
	}
}
gestures {
  gesture = 3, horizontal, workspace
  workspace_swipe_distance = 500
  workspace_swipe_invert = true
  workspace_swipe_min_speed_to_force = 30
  workspace_swipe_cancel_ratio = 0.5
  workspace_swipe_create_new = true 
  workspace_swipe_forever = true
  #workspace_swipe_use_r = true #uncomment if wanted a forever create a new workspace with swipe right

  gesture = 4, up, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.5}')"
  gesture = 4, down, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.5}')" 

}

###########
# GENERAL
###########
 
general {
    gaps_in=5
    gaps_out=15
    border_size=3  # Adjust this value as needed
   #col.active_border = 0xff89ddff 0xff7dcfff 0xff7aa2f7 270deg # Set active border colour (gradient)
    col.inactive_border = 0xff414868 # Inactive gray
    col.active_border = rgb(8839EF) rgb(7CB6F5) rgb(FD807E) 45deg # Set active border colour (gradient)
   #col.inactive_border = rgb(d8dee9)
    resize_on_border = true

}



##############
# DECORATION
##############
 decoration {
 
# ROUNDING 

    rounding = 10

###########
# OPACITY
###########

    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

########
# BLUR
########

 blur {
    enabled = true
    size = 6
    passes = 2
    new_optimizations = on
    ignore_opacity = true
    xray = true  
  
# Blur rules
    layerrule = match:namespace wofi, blur on
    layerrule = match:namespace wlogout, blur on

# Ignore alpha for certain layers
    layerrule = match:namespace wofi, ignore_alpha 1
    layerrule = match:namespace wlogout, ignore_alpha 1

# Xray / transparency for overlays
    layerrule = match:namespace wofi, xray 1
    layerrule = match:namespace wlogout, xray 1
}

##########          
# SHADOW
##########

shadow {
    enabled = true
    range = 30
    render_power = 3
    color = 0x66000000
}
    dim_inactive = false
}  

#############
# ANIMATION
#############

animations {
    enabled = yes
    
# BEZIER CURVE  
    
    bezier = liner, 1, 1, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration
    
# ANIMATION EFFECTS    
  
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = border, 1, 1, liner
    animation = borderangle, 1, 75, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 6, default,slide
    animation = workspaces, 1, 7, menu_decel, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}
   
###########   
# LAYOUTS
###########
   
dwindle {
    force_split = 0 
    special_scale_factor = 0.8
    split_width_multiplier = 1.0 
    use_active_for_splits = true
   #pseudotile = yes 
   #preserve_split = true
    smart_resizing = true
   #smart_split = true

}

master {
  new_status = master
  new_on_top = 1
  mfact = 0.5

}   
  general {
  resize_on_border = true
  layout = scrolling
}

master {
   #new_is_master = true
    special_scale_factor = 0.8
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.5
    follow_focus = true
}

########
# MISC
########

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    vrr = 0
    enable_swallow = true
    swallow_regex = ^(kitty)$
    focus_on_activate = true
    allow_session_lock_restore = true
    # new_window_takes_over_fullscreen is removed in v0.53.0
    # Use windowrules for fullscreen-inhibit on app level
    close_special_on_empty = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_autoreload = true
    mouse_move_focuses_monitor = true
    always_follow_on_dnd = true
    initial_workspace_tracking = 0
    enable_anr_dialog = true    # Application not Responding (ANR)
    anr_missed_pings = 15       # ANR Threshold default 1 is too low
    allow_session_lock_restore = true  # Prevent lockscreen crash when resume from suspend
}  
binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
    pass_mouse_when_bound = true
}


