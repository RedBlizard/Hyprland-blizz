# █▀▄▀█ Window Rules - Clean & Optimized
# This configuration is structured for readability and maintainability

######################################
# Window Rules - Workspace Assignment
######################################

# Workspace 1: Terminals
    windowrule = match:class ^(kitty)$, workspace 1
    windowrule = match:class ^(alacritty)$, workspace 1

# Workspace 2: Browser
    windowrule = match:class ^(brave-browser)$, workspace 2
    windowrule = match:class ^(brave-youtube.com__-Default)$, workspace 2

# Workspace 3: File Managers
    windowrule = match:class ^(org.kde.dolphin)$, workspace 3    
#    windowrule = match:class ^(thunar)$, workspace 3

# Workspace 4: Editors
    windowrule = match:class ^(geany)$, workspace 4
    windowrule = match:class ^(code-oss --open-url %U)$, workspace 4
    windowrule = match:class ^(kitty --class=nvim nvim)$, workspace 4

# Workspace 5: Email / Outlook
    windowrule = match:class ^(brave-outlook.com__-Default)$, workspace 5

# Workspace 6: Web / Open WebUI
    windowrule = match:class ^(helium-browser)$, workspace 6

# Workspace 7: Virtualization
    windowrule = match:class ^(kitty --class=virt-manager virt-manager)$, workspace 7

# Workspace 8: Wallpaper / Tools
    windowrule = match:class ^(waytrogen)$, workspace 8

# Workspace 9: Media
    windowrule = match:class ^(obs)$, workspace 9
    windowrule = match:class ^(guvcview)$, workspace 9

# Workspace 10: Misc / Utilities / Settings
    windowrule = match:class ^(kitty --class=pacseek pacseek)$, workspace 10
    windowrule = match:class ^(nwg-look)$, workspace 10
    windowrule = match:title ^(hypr-welcome)$, workspace 10
    windowrule = match:title ^(Choose Configuration)$, workspace 10
    windowrule = match:title ^(YAD Network Manager)$, workspace 10    
    windowrule = match:class ^(btrfs-assistant)$, workspace 10
    windowrule = match:class ^(GParted)$, workspace 10
    windowrule = match:title ^(hyprmod)$, workspace 10

############################
# OPACITY
############################
    windowrule = match:class ^(brave-browser)$, opacity 0.90 0.90
    windowrule = match:class ^(geany)$, opacity 0.80 0.70
    windowrule = match:class ^(thunar)$, opacity 0.80 0.70
    windowrule = match:class ^(file-roller)$, opacity 0.80 0.70
    windowrule = match:class ^(nwg-look)$, opacity 0.80 0.70
    windowrule = match:class ^(qt6ct)$, opacity 0.80 0.70
    windowrule = match:class ^(pavucontrol)$, opacity 0.80 0.70
    windowrule = match:class ^(yad)$, opacity 0.80 0.70
    windowrule = match:title ^(nvim)$, opacity 0.80 0.70
    windowrule = match:class ^(code-oss --open-url %U)$, opacity 0.80 0.70

############################
# FULLSCREEN / FLOAT (WLOGOUT)
############################
    windowrule = match:title ^(wlogout)$, fullscreen on
    windowrule = match:title ^(wlogout)$, float on

############################
# WINDOWS TILED
############################
    windowrule = match:class ^(tile)$, tile on
    windowrule = match:class ^(libreoffice.*)$, tile on
    windowrule = match:class ^(azote)$, tile on
    windowrule = match:class ^(brave-browser)$, tile on
    windowrule = match:class ^(chromium.desktop)$, tile on
    windowrule = match:class ^(firedragon)$, tile on
    windowrule = match:class ^(firefox)$, tile on
    windowrule = match:class ^(kitty)$, tile on
    windowrule = match:class ^(timeshift-gtk)$, tile on
    windowrule = match:class ^(sddm-conf)$, tile on
    
############################
# WINDOWS FLOAT
############################
    windowrule = match:class ^(floating)$, float on
    windowrule = match:class ^(Alacritty)$, float on
    windowrule = match:class ^(kitty_floats)$, float on
    windowrule = match:class ^(pavucontrol-qt)$, float on
    windowrule = match:class ^(nm-connection-editor)$, float on
    windowrule = match:class ^(Wofi)$, float on
    windowrule = match:class ^(rofi)$, float on
    windowrule = match:class ^(yad)$, float on   

############################
# FLOATING WINDOWS POSITIONS
############################
    windowrule = match:title ^(branchdialog)$, float on
    windowrule = match:title ^(confirmreset)$, float on
    windowrule = match:title ^(error)$, float on
    windowrule = match:title ^(file-roller)$, float on
    windowrule = match:title ^(Media viewer)$, float on
    windowrule = match:title ^(notification)$, float on
    windowrule = match:title ^(splash)$, float on
    windowrule = match:title ^(xfce4-terminal)$, float on

############################
# CENTERED FLOAT WINDOWS
############################
    windowrule = match:title ^(blueman-manager)$, float on, center on
    windowrule = match:title ^(confirm)$, float on, center on
    windowrule = match:title ^(download)$, float on, center on
    windowrule = match:title ^(dialog)$, float on, center on
    windowrule = match:title ^(file_progress)$, float on, center on
    windowrule = match:title ^(galculator)$, float on, center on
    windowrule = match:title ^(konsole)$, float on, center on
    windowrule = match:title ^(nm-connection-editor)$, float on, center on
    windowrule = match:title ^(Open File)$, float on, center on
    windowrule = match:title ^(pavucontrol-qt)$, float on, center on
    windowrule = match:title ^(Wofi)$, float on, center on
    windowrule = match:title ^(Rofi)$, float on, center on
    windowrule = match:title ^(yad)$, float on, center on

############################
# NO ANIMATION FLOAT
############################
    windowrule = match:title ^(Rofi)$, float on, no_anim on
    windowrule = match:title ^(Wofi)$, float on, no_anim on

############################
# WINDOW SIZE
############################
    windowrule = match:class ^(Alacritty)$, size 1889 1006
    windowrule = match:class ^(kitty_floats)$, size 800 600
    windowrule = match:class ^(download)$, size 800 600
    windowrule = match:title ^(Open File|Save File|Volume Control)$, size 800 600

############################
# SPECIAL RULES
############################
    windowrule = match:class ^(brave)$, match:title ^(Save File|Open File)$, float on
    windowrule = match:title ^(Picture-in-Picture)$, float on
    windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
    windowrule = match:class ^(/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1)$, float on
    windowrule = match:title ^(kitty_floats)$, float on, move cursor 50% 50%

############################
# IDLE INHIBIT
############################
    windowrule = match:class ^(mpv)$, idle_inhibit focus
    windowrule = match:class ^(obs)$, idle_inhibit focus
    windowrule = match:class ^(Brave-browser)$, idle_inhibit fullscreen, idle_inhibit focus


############################
# XWAYLAND VIDEO BRIDGE
############################
    windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 override 0.0 override
    windowrule = match:class ^(xwaylandvideobridge)$, no_anim on
    windowrule = match:class ^(xwaylandvideobridge)$, no_focus on
    windowrule = match:class ^(xwaylandvideobridge)$, no_initial_focus on

############################
# MOVE
############################

# Alacritty float exact over Kitty tile
    windowrule = match:class ^(Alacritty)$, float on, move 12 55, size 1889 1006, no_anim on

############################
# PICTURE IN PICTURE
############################
    windowrule = match:title ^(Picture in picture)$, float on
    windowrule = match:title ^(Picture in picture)$, pin on
    windowrule = match:title ^(Picture in picture)$, float on, size 425 265, move 1478 799, opacity 1.0 1.0
    


