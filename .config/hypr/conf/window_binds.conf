# █▀▄▀█ Window Binds - Clean & Optimized
# This configuration is structured for readability and maintainability

###############################################
# Window Management - Kill / Exit / Fullscreen
###############################################

    bind = $mainMod, C, killactive,
    bind = $mainMod SHIFT, Q, exit,
    bind = $mainMod ALT, F, fullscreen,
    bind = $mainMod ALT, P, pseudo, # dwindle

######################################
# Window Management - Move / Resize
######################################

# Move windows (vim style)
    bind = $mainMod CTRL, H, movewindow, l
    bind = $mainMod CTRL, L, movewindow, r
    bind = $mainMod CTRL, K, movewindow, u
    bind = $mainMod CTRL, J, movewindow, d

# Resize windows (vim style)
    binde = $mainMod SHIFT, H, resizeactive, -50 0
    binde = $mainMod SHIFT, L, resizeactive, 50 0
    binde = $mainMod SHIFT, K, resizeactive, 0 -50
    binde = $mainMod SHIFT, J, resizeactive, 0 50

######################################
# Floating / Layout Toggles
######################################

    bind = $mainMod, Space, togglefloating           # Toggle floating for active window
    bind = $mainMod SHIFT, Space, workspaceopt, allfloat  # Toggle all windows to float
    bind = $mainMod, P, workspaceopt, allpseudo     # Toggle all windows pseudo

######################################
# Floating Workspace Navigation
######################################

# Switch between windows in floating workspace
    bind = SUPER, Tab, cyclenext, bringactivetotop  # Cycle focus and bring to top

######################################
# Workspace Navigation
######################################

# Switch workspaces with mainMod + [0-9]
    bind = $mainMod, 1, workspace, 1
    bind = $mainMod, 2, workspace, 2
    bind = $mainMod, 3, workspace, 3
    bind = $mainMod, 4, workspace, 4
    bind = $mainMod, 5, workspace, 5
    bind = $mainMod, 6, workspace, 6
    bind = $mainMod, 7, workspace, 7
    bind = $mainMod, 8, workspace, 8
    bind = $mainMod, 9, workspace, 9
    bind = $mainMod, 0, workspace, 10

# Switch workspaces with mainMod + ALT
    bind = $mainMod ALT, up, workspace, e+1
    bind = $mainMod ALT, down, workspace, e-1

# Move active window to workspace with mainMod + CTRL + [0-9]
    bind = $mainMod CTRL, 1, movetoworkspace, 1
    bind = $mainMod CTRL, 2, movetoworkspace, 2
    bind = $mainMod CTRL, 3, movetoworkspace, 3
    bind = $mainMod CTRL, 4, movetoworkspace, 4
    bind = $mainMod CTRL, 5, movetoworkspace, 5
    bind = $mainMod CTRL, 6, movetoworkspace, 6
    bind = $mainMod CTRL, 7, movetoworkspace, 7
    bind = $mainMod CTRL, 8, movetoworkspace, 8
    bind = $mainMod CTRL, 9, movetoworkspace, 9
    bind = $mainMod CTRL, 0, movetoworkspace, 10

# Silent move with mainMod + SHIFT + [0-9]
    bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
    bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
    bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
    bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
    bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
    bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
    bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
    bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
    bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
    bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Use brackets for next/previous workspace
    bind = $mainMod CTRL, bracketleft, movetoworkspace, -1
    bind = $mainMod CTRL, bracketright, movetoworkspace, +1
    bind = $mainMod SHIFT, bracketleft, movetoworkspacesilent, -1
    bind = $mainMod SHIFT, bracketright, movetoworkspacesilent, +1

# Scroll through workspaces with mainMod + scroll
    bind = $mainMod, mouse_down, workspace, e+1
    bind = $mainMod, mouse_up, workspace, e-1
    bind = CTRL, right, workspace, e+1
    bind = CTRL, left, workspace, e-1

######################################
# Window Focus Navigation
######################################

# Move focus with mainMod + arrows
    bind = $mainMod, left, movefocus, l
    bind = $mainMod, right, movefocus, r
    bind = $mainMod, up, movefocus, u
    bind = $mainMod, down, movefocus, d

# Vim style focus (optional)
    bind = $mainMod, H, movefocus, l
    bind = $mainMod, J, movefocus, r
    bind = $mainMod, K, movefocus, u
    bind = $mainMod, L, movefocus, d

######################################
# Special Workspace / Group
######################################

    bind = $mainMod, Y, togglespecialworkspace
    bind = $mainMod SHIFT, Y, movetoworkspace, special
    bind = $mainMod ALT, Y, exec, $notifycmd 'Toggled Special Workspace'

    bind = $mainMod, g, togglegroup
    bind = $mainMod, tab, changegroupactive
    bind = $mainMod, G, exec, $notifycmd 'Toggled Group Mode'

# Center active window
    bind = $mainMod, a, exec, hyprctl dispatch centerwindow

# Move active window to special workspace
    bind = $mainMod SHIFT, U, movetoworkspace, special
    bind = $mainMod, U, togglespecialworkspace

######################################
# Mouse Bindings
######################################

# Move/Resize windows with mouse + mainMod
    bindm = $mainMod, mouse:272, movewindow
    bindm = $mainMod, mouse:273, resizewindow

######################################
# Hyprscrolling / Layout Adjustments
######################################

    bind = $mainMod, period, layoutmsg, move +col
    bind = $mainMod, comma, layoutmsg, swapcol l 
    bind = $mainMod SHIFT, period, layoutmsg, movewindowto r
    bind = $mainMod SHIFT, comma, layoutmsg, movewindowto l
    bind = $mainMod SHIFT, up, layoutmsg, movewindowto u
    bind = $mainMod SHIFT, down, layoutmsg, movewindowto d

######################################
# Hyprscrolling / workspace layouts
######################################    

    workspace = 1, layoutopt:direction:right

   

