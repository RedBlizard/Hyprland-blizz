# █▀▄▀█ Key Binds - Clean & Optimized
# SUPER key is set as main modifier
    $mainMod = SUPER

######################################
# Keybinds - Terminal / Apps
######################################

# Workspace 1: Terminals
    bind = $mainMod, Return, exec, kitty
    bind = $mainMod SHIFT, Return, exec, alacritty

# Workspace 2: Browser
    bind = $mainMod SHIFT, B, exec, brave
    bind = $mainMod SHIFT, Y, exec, brave --app=https://www.youtube.com/

# Workspace 3: File Managers
    bind = $mainMod SHIFT, D, exec, ~/.config/hypr/scripts/filemanager.sh
    bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/dolphin-as_root.sh
    bind = $mainMod SHIFT, F, exec, thunar

# Workspace 4: Editors
    bind = $mainMod SHIFT, G, exec, geany
    bind = $mainMod SHIFT, V, exec, kitty --class=nvim nvim
    bind = $mainMod SHIFT, E, exec, ~/.config/hypr/scripts/vscode.sh

# Workspace 5: Email / Productivity
    bind = $mainMod SHIFT, M, exec, brave --app=https://outlook.com

# Workspace 6: Open WebUI / Localhost
    bind = $mainMod, O, exec, ~/.config/hypr/scripts/launch_helium-browser.sh

# Workspace 7: Virtualization
    bind = $mainMod SHIFT, K, exec, kitty --class=virt-manager virt-manager

# Workspace 8: Wallpaper / Tools
    bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/waytrogen.sh

# Workspace 9: Media
    bind = $mainMod SHIFT, O, exec, obs
    bind = $mainMod SHIFT, C, exec, guvcview

# Workspace 10: Misc / Utilities
    bind = $mainMod SHIFT, P, exec, kitty --class=pacseek pacseek
    bind = $mainMod SHIFT, L, exec, nwg-look
    bind = $mainMod SHIFT, W, exec, hypr-welcome
    bind = $mainMod, G, exec, GParted
    bind = $mainMod, B, exec, btrfs-assistant-launcher

######################################
# Kitty Terminal Modes
######################################

# Floating / Fullscreen / Spawn scripts
    bind = $mainMod SHIFT, T, exec, kitty --title kitty_floats      # Floating kitty
    bind = $mainMod ALT, F11, exec, kitty --start-as=fullscreen     # Fullscreen kitty
    bind = $mainMod ALT, Return, exec, ~/.config/hypr/scripts/spawn-terminal.sh  # Draw rectangle terminal

######################################
# Wofi / Rofi Launchers
######################################

     bind = $mainMod, D, exec, ~/.config/hypr/scripts/wofi-drun
     bind = $mainMod, R, exec, ~/.config/hypr/scripts/wofi-run
    
#    bindd = $mainMod, D, app launcher, exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window
#    bindd = $mainMod, R, app launcher, exec, pkill rofi || true && rofi -show run -modi drun,filebrowser,run,window

# Clipboard manager
    
    bind = $mainMod ALT, H,  exec, cliphist list | wofi -dmenu | cliphist decode | wl-copy
    bind = $mainMod ALT, C, exec, ~/.config/hypr/scripts/cliphist-menu.sh
    

# Online radio streams
    bind = CTRL, B, exec, ~/.config/wofi/wofi-beats/wofi-beats -theme ~/.config/wofi/style.css

######################################
# Network
######################################

    bind = $mainMod, n, exec, ~/.config/hypr/hypr-network-manager/hypr-network-manager.sh

######################################
# HyprPicker / Settings
######################################

    bind = $mainMod, P, exec, hyprpicker -a -n               # Color picker
    bind = $mainMod SHIFT, s, exec, ~/.config/waybar/scripts/settings.sh

######################################
# Waybar Scripts
######################################

    bind = $mainMod ALT, B, exec, ~/.config/waybar/scripts/toggle-waybar.sh
    bind = $mainMod ALT, W, exec, ~/.config/waybar/scripts/switch-waybar-config.sh

######################################
# Keybind / HyprIdle
######################################

    bind = $mainMod, i, exec, ~/.config/hypr/scripts/keyhint.sh
    bind = $mainMod SHIFT, i, exec, ~/.config/waybar/scripts/hypridle-toggle.sh

######################################
# Wallpaper / KB Layout
######################################

    bind = $mainMod, W, exec, ~/.config/hypr/scripts/changeWallpaper.sh
    bind = ALTSHIFT, Shift_L, exec, ~/.config/hypr/scripts/switch_kb_layout.sh

######################################
# Lock Screen / Logout
######################################

    bind = CTRL ALT, L, exec, hyprlock
    bind = $mainMod, X, exec, wlogout --protocol layer-shell -b 5 -T 400 -B 400

######################################
# Screenshots
######################################

# Region
    bind = , Print, exec, ~/.config/hypr/scripts/screenshot rc
    bind = SUPER, Print, exec, ~/.config/hypr/scripts/screenshot rf
    bind = CTRL, Print, exec, ~/.config/hypr/scripts/screenshot ri

# Screen
    bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot sc
    bind = SUPER SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot sf
    bind = CTRL SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot si

######################################
# Audio / Microphone
######################################

# Volume keys
    binde = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh volume_up
    binde = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh volume_down
    binde = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh volume_mute

# Microphone volume
    binde = $mainMod, XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh mic_up
    binde = $mainMod, XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh mic_down
    binde = $mainMod, XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mic_mute

######################################
# Brightness
######################################

    binde = ALT, F12, exec, brightnessctl set 5%+
    binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
    binde = ALT, F11, exec, brightnessctl set 5%-
    binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

######################################
# Game Mode
######################################

    bind = $mainMod, F1, exec, ~/.config/hypr/scripts/gamemode.sh
    
######################################
# Settings
######################################    

    bind = $mainMod SHIFT, H, exec, ~/.config/hypr/scripts/hyprmod.sh
    
######################################    
# Monitor eDP-1 Toggle
######################################

    bind = $mainMod, P, exec, ~/.config/hypr/scripts/toggle_display.sh
